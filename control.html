<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✏️ 카드 관리 - memo_crd</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* control.html 전용 스타일 */
    .control-app { max-width: 720px; margin: 0 auto; padding: 16px 20px 32px; }
    .control-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .control-header h1 { font-size: 20px; font-weight: 700; margin: 0; }
    .back-link { color: var(--accent-blue); text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }

    .deck-selector { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .deck-selector select { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text-primary); font-size: 14px; flex: 1; min-width: 150px; }

    .control-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--card-border); }
    .control-tab { padding: 10px 20px; border: none; background: none; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.15s; }
    .control-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-blue); }
    .control-tab:hover { color: var(--text-primary); }

    .control-page { display: none; }
    .control-page.active { display: block; }

    /* 폼 스타일 */
    .form-section { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
    .form-section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .form-section-title .stage-num { background: var(--accent-blue); color: #1e1e2e; padding: 0 8px; border-radius: 4px; font-size: 11px; }

    .field-group { margin-bottom: 10px; }
    .field-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 3px; font-weight: 500; }
    .field-group input, .field-group textarea, .field-group select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text-primary); font-size: 14px; font-family: inherit; }
    .field-group textarea { min-height: 60px; resize: vertical; }
    .field-group input:focus, .field-group textarea:focus, .field-group select:focus { border-color: var(--accent-blue); outline: none; }

    .list-entry-item { background: var(--bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px; margin-bottom: 8px; position: relative; }
    .list-entry-item .del-entry-btn { position: absolute; top: 6px; right: 8px; background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 16px; }
    .list-text-item { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .list-text-item input { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text-primary); font-size: 13px; }
    .list-text-item .del-text-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
    .list-text-item .del-text-btn:hover { color: var(--accent-red); }

    .add-btn { padding: 6px 14px; border: 1px dashed var(--card-border); border-radius: 6px; background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: 0.15s; }
    .add-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

    .form-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .form-actions .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-save { background: var(--accent-blue); color: #1e1e2e; }
    .btn-save:hover { opacity: 0.85; }
    .btn-clear { background: var(--button-bg); color: var(--text-secondary); }
    .btn-clear:hover { background: var(--button-active); }

    /* 검색 결과 */
    .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-box input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text-primary); font-size: 14px; }
    .search-box input:focus { border-color: var(--accent-blue); outline: none; }

    .search-result-item { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .search-result-item .result-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .search-result-item .result-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .search-result-item .result-deck { font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 2px 8px; border-radius: 4px; }
    .search-result-item .result-actions { display: flex; gap: 4px; margin-top: 6px; }
    .search-result-item .result-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 2px 6px; }
    .search-result-item .result-actions button:hover { color: var(--text-primary); }
    .search-result-item .result-actions .del-btn:hover { color: var(--accent-red); }

    .result-body { font-size: 13px; color: var(--text-secondary); margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
    .result-edit-area { margin-top: 8px; }
    .result-edit-area textarea { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text-primary); font-size: 13px; font-family: inherit; min-height: 80px; }
    .result-edit-area .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .result-edit-area .edit-actions button { padding: 4px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .edit-save-btn { background: var(--accent-blue); color: #1e1e2e; }
    .edit-cancel-btn { background: var(--button-bg); color: var(--text-secondary); }

    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 14px; }

    @media (max-width: 480px) {
      .control-app { padding: 10px 12px 24px; }
      .control-tab { padding: 8px 12px; font-size: 13px; }
      .form-section { padding: 12px 14px; }
    }
  </style>
</head>
<body>

  <div class="control-app">

    <!-- 헤더 -->
    <div class="control-header">
      <h1>✏️ 카드 관리</h1>
      <a href="index.html" class="back-link">← 메인으로</a>
    </div>

    <!-- 덱 선택 -->
    <div class="deck-selector">
      <select id="deckSelect"></select>
      <button class="btn-save" id="addDeckBtn" style="padding:6px 14px;font-size:13px;border:none;border-radius:6px;cursor:pointer;background:var(--accent-blue);color:#1e1e2e;">+ 덱 추가</button>
    </div>

    <!-- 탭 -->
    <div class="control-tabs">
      <button class="control-tab active" data-tab="new">✏️ 새 카드</button>
      <button class="control-tab" data-tab="search">🔍 검색/관리</button>
    </div>

    <!-- 새 카드 탭 -->
    <div id="tab-new" class="control-page active">
      <div id="newCardForm">
        <!-- JavaScript로 동적 생성 -->
      </div>
      <div class="form-actions">
        <button class="btn btn-save" id="saveCardBtn">💾 저장</button>
        <button class="btn btn-clear" id="clearFormBtn">🗑️ 지우기</button>
      </div>
    </div>

    <!-- 검색/관리 탭 -->
    <div id="tab-search" class="control-page">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="검색어 (단어, baseWord, deck...)">
        <button id="searchBtn" style="padding:8px 16px;border:none;border-radius:8px;background:var(--accent-blue);color:#1e1e2e;font-weight:600;cursor:pointer;">검색</button>
      </div>
      <div id="searchResults"></div>
    </div>

  </div>

  <!-- ===== 확인 다이얼로그 ===== -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box modal-box-small">
      <p id="confirm-text"></p>
      <div class="confirm-actions">
        <button id="confirm-yes" class="btn-pill x-btn">삭제</button>
        <button id="confirm-no" class="btn-pill">취소</button>
      </div>
    </div>
  </div>

  <!-- ===== 토스트 컨테이너 ===== -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
  <script>
    // ===== control.html 전용 초기화 =====
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof initControl === 'function') {
        initControl();
      } else {
        console.error('app.js 로드 실패: initControl 함수를 찾을 수 없습니다.');
      }
    });
  </script>
</body>
</html>
