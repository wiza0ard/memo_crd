<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📚 memo_crd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 설정 모달 (최초 1회) ===== -->
  <div id="setup-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>🔑 GitHub 연동 설정</h2>
      <p class="modal-desc">
        Personal Access Token을 입력하면 <code>memo_crd</code> 저장소에 연결됩니다.<br>
        토큰은 이 기기의 브라우저에만 저장됩니다.
      </p>
      <label>Personal Access Token</label>
      <input id="input-token" type="password" placeholder="github_pat_...">
      <p class="modal-hint">
        발급: GitHub → Settings → Developer settings → Fine-grained tokens<br>
        → Repository access: <b>memo_crd</b> 저장소 선택<br>
        → Contents: <b>Read and write</b>
      </p>
      <button id="setup-save-btn" class="btn-next">시작하기</button>
      <p id="setup-error" class="setup-error hidden"></p>
    </div>
  </div>

  <!-- ===== 메인 앱 ===== -->
  <div id="app" class="app hidden">

    <!-- 상단바 -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="app-title">📚 memo_crd</span>
        <span id="sync-indicator" class="sync-indicator">●</span>
        <span id="sync-text" class="sync-text">대기중</span>
      </div>
      <div class="topbar-right">
        <button id="refresh-btn" class="icon-btn" title="새로고침">↻</button>
        <button id="settings-btn" class="icon-btn" title="설정">⚙️</button>
      </div>
    </div>

    <!-- 덱 탭 -->
    <div class="deck-tabs" id="deckTabs">
      <!-- JavaScript로 동적 생성 -->
    </div>

    <!-- ===== 상단 정보 패널 ===== -->
    <div class="info-panel" id="infoPanel">
      <div class="info-left">
        <span id="starDisplay" class="star-display">☆☆☆☆☆</span>
        <span id="xDisplay" class="x-display">○○</span>
        <span id="progressDisplay" class="progress">0 / 0</span>
      </div>
      <div class="info-center">
        <span id="cardTitle" class="card-title">-</span>
        <span id="cardSub" class="card-sub"></span>
        <span id="stageIndicator" class="stage-indicator"></span>
      </div>
      <div class="info-right">
        <button id="deleteBtn" class="btn-delete-sm" title="삭제">🗑️</button>
      </div>
    </div>

    <!-- ===== 카드 영역 ===== -->
    <div class="card-container" id="cardContainer">
      <div class="card" id="flashCard">
        <div class="card-inner" id="cardInner">
          <!-- JavaScript로 동적 생성 -->
        </div>
      </div>
    </div>

    <!-- ===== 하단 컨트롤 패널 ===== -->
    <div class="controls-panel">
      <div class="nav-row">
        <button class="ctrl-btn" id="prevBtn">◀ 이전</button>
        <button class="ctrl-btn" id="nextBtn">다음 ▶</button>
        <button class="ctrl-btn shuffle-btn" id="shuffleBtn">🔀 셔플</button>
        <button class="ctrl-btn reset-btn" id="resetBtn">⟳ 리셋</button>
      </div>
      <div class="score-row">
        <button class="btn-pill star-btn" data-action="add-star">★+</button>
        <button class="btn-pill star-btn" data-action="remove-star">★-</button>
        <button class="btn-pill x-btn" data-action="add-x">❌+</button>
        <button class="btn-pill x-btn" data-action="remove-x">❌-</button>
        <button class="btn-pill" id="copyBtn" title="복사">📋</button>
      </div>
    </div>

    <!-- ===== 푸터 ===== -->
    <footer class="app-footer">
      <div id="footerStats" class="footer-stats"></div>
      <div class="footer-help">←/Space: 다음 | +/-: ★/❌</div>
      <div id="statusText" class="status-text"></div>
    </footer>

  </div>

  <!-- ===== 확인 다이얼로그 ===== -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box modal-box-small">
      <p id="confirm-text"></p>
      <div class="confirm-actions">
        <button id="confirm-yes" class="btn-pill x-btn">삭제</button>
        <button id="confirm-no" class="btn-pill">취소</button>
      </div>
    </div>
  </div>

  <!-- ===== 토스트 컨테이너 ===== -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
  <script>
    // ===== index.html 전용 초기화 =====
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof initIndex === 'function') {
        initIndex();
      } else {
        console.error('app.js 로드 실패: initIndex 함수를 찾을 수 없습니다.');
      }
    });
  </script>
</body>
</html>
